<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册信息</title>
</head>
<body>
    <h1>注册信息</h1>
    <form action="">
    <!-- 表单控制 -->
    <!-- 个人信息 -->
    <h2>个人信息</h2>
    <label>姓名: </label> <input type="text" placeholder="请输入真实姓名">
    <br>
    <label >密码: </label> <input type="password" placeholder="请输入密码">
    <br><br>
    <label >确认密码: </label> <input type="password" placeholder="请确认密码">
    <br><br>
    <label>性别: </label>
    <label><input type="radio" name="gender">男</label>
    <label><input type="radio" name="gender" checked>女</label>
    <br><br>
    <label>居住城市:</label>
    <select name="" id="">
        <option>北京</option>
        <option>上海</option>
        <option>深圳</option>
        <option>武汉</option>
    </select>
    <!-- 教育经历 -->
     <br><br>
     <h2>教育经历</h2>
     <label for="">最高学历: </label>
     <select name="" id="">
        <option value="">博士</option>
        <option value="">硕士</option>
        <option value="">本科</option>
        <option value="">大专</option>
     </select>
     <br>
     <label for="">学校名称:</label><input type="text">
     <label for="">所学专业:</label><input type="text">
     <br><br>
     <label for="">在校时间: </label>
     <select name="" id="">
        <option value="">2015</option>
        <option value="">2016</option>
        <option value="">2017</option>
        <option value="">2018</option>
     </select>
     --
     <select name="" id="">
        <option value="">2019</option>
        <option value="">2020</option>
        <option value="">2021</option>
        <option value="">2022</option>
     </select>
    <!-- 工作经历 -->
     <h2>工作经历</h2>
     <label for="">公司名称:</label> <input type="text">
     <br><br>
    <label for="">工作描述:</label>
    <br>
    <textarea name="" id=""></textarea>
    <!-- 协议 和 按钮 -->
     <br><br>
     <input type="checkbox"><label for="">已阅读并同意以下协议:</label>
    <ul>
        <li>
            <a href="">用户服务协议</a>
            
        </li>
        <li>
            <a href="">隐私协议</a>
        </li>
    </ul>
    <br><br><br>
    <button>免费注册</button>
    <button type="reset">重新填写</button>
    </form>  
</body>
</html>
